<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amphibien Zähler</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2e7d32" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<h1>🐸 Amphibien Zähler</h1>

<section class="session">
  <input placeholder="Bearbeiter" id="observer" />
  <input type="date" id="date" />
  <input type="time" id="time" />
</section>

<label for="temperature">Temperatur (°C)</label>
<input
  type="number"
  id="temperature"
  placeholder="Temperatur °C"
  step="0.1"
/>

<label for="weather">Wetter</label>
<select id="weather">
  <option value="">Wetter auswählen</option>
  <option value="Regen">Regen</option>
  <option value="Nass/feucht">Nass / feucht</option>
  <option value="Trocken/Klar">Trocken / Klar</option>
</select>

<label for="locationSelect">Ort</label>
<select id="locationSelect">
  <option value="">Ort auswählen</option>
  <option value="Bistal">Bistal</option>
  <option value="Mercatorstraße">Mercatorstraße</option>
  <option value="Wilhelm-Holert-Straße">Wilhelm-Holert-Straße</option>
  <option value="Worther Weg">Worther Weg</option>
  <option value="Westerheese">Westerheese</option>
  <option value="Neu-Gülzow">Neu-Gülzow</option>
  <option value="custom">Andere...</option>
</select>

<input
  id="customLocation"
  placeholder="Ort eingeben"
  style="display:none"
/>
<div class="bucket-row">

  <label for="bucketNr">Eimer-Nr.</label>

  <div class="bucket-controls">
    <input type="number" id="bucketNr" placeholder="Eimer Nummer">
    <button id="nextBucketBtn">+1 Eimer</button>
  </div>

</div>

<div id="speciesContainer"></div>

<div class="species-card">
  <h3>Tote Tiere</h3>

  <select id="deadSpecies">
    <option value="">Art auswählen</option>
  </select>

  <div id="deadCounter"></div>
</div>

<textarea id="notes" placeholder="Bemerkungen"></textarea>

<button id="saveBtn">💾 Speichern</button>
<button id="exportBtn">📤 CSV Export + Teilen</button>
<button id="resetBtn">🔄 Neue Zählung starten</button>

<h2>Gespeicherte Eimer</h2>
<div id="entryList"></div>

<script src="app.js"></script>
</body>
</html>
