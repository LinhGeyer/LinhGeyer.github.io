<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amphibien Zähler</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2e7d32" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<h1>🐸 Amphibien Zähler</h1>

<section class="session">
  <input placeholder="Bearbeiter" id="observer" />
  <input type="date" id="date" />
  <input type="time" id="time" />
</section>

<label for="locationSelect">Ort</label>
<select id="locationSelect">
  <option value="">Ort auswählen</option>
  <option value="Worther Weg">Worther Weg</option>
  <option value="Am Teich">Am Teich</option>
  <option value="Waldstraße">Waldstraße</option>
  <option value="custom">Andere...</option>
</select>

<input
  id="customLocation"
  placeholder="Ort eingeben"
  style="display:none"
/>

<label for="bucketNr">Eimer-Nr.</label>
<input
  type="number"
  id="bucketNr"
  placeholder="Eimer Nummer"
/>

<div id="speciesContainer"></div>

<textarea id="notes" placeholder="Bemerkungen"></textarea>

<button id="saveBtn">💾 Speichern</button>
<button id="exportBtn">📤 CSV Export</button>
<button id="resetBtn">🔄 Neue Zählung starten</button>

<script src="app.js"></script>
</body>
</html>
