<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amphibien Zähler</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2e7d32" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>🐸 Amphibien Zähler</h1>

  <form id="surveyForm">
    <h2>Allgemein</h2>

    <input placeholder="Bearbeiter" id="observer" required />
    <input type="date" id="date" required />
    <input type="time" id="time" required />
    <input placeholder="Wetter" id="weather" />
    <input type="number" placeholder="Temperatur °C" id="temp" />

    <h2>Erdkröte</h2>
    <input type="number" placeholder="adult" id="erd_adult" />
    <input type="number" placeholder="juv" id="erd_juv" />
    <input type="number" placeholder="paare" id="erd_paare" />

    <h2>Bemerkungen</h2>
    <textarea id="notes"></textarea>

    <button type="submit">💾 Speichern</button>
  </form>

  <button id="exportBtn">📤 CSV Export</button>

  <script src="app.js"></script>
</body>
</html>
